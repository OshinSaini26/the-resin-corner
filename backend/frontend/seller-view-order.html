<!DOCTYPE html>
<html>
<head>
  <title>Order Details</title>
  <style>
   body{
    font-family: Arial, sans-serif;

    background-image:url("images/background.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    margin:0;
    padding:0;
}

.header-banner{
    text-align:center;
}

.header-banner img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    display:block;
}

    .container{

    max-width:700px;

    margin:40px auto;

    background:rgba(255,255,255,0.45);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    padding:30px;

    border-radius:20px;

    box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

    h2{
    text-align:center;

    color:#2f3a2f;

    font-size:32px;

    margin-bottom:25px;
}

    .row{

    margin:12px 0;

    padding:12px;

    background:rgba(255,255,255,0.6);

    border-radius:10px;

    font-size:16px;
}
select{

    width:100%;

    padding:12px;

    margin-top:20px;

    border-radius:8px;

    border:1px solid #ddd;

    font-size:15px;
}

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background:#115b12;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover{
    background:#0c450d;
}
  </style>
</head>

<body>
  <div class="header-banner">
    <img src="images/header.png" alt="The Resin Corner">
</div>
<div class="container">
  <button onclick="window.location.href='seller-dashboard.html'">
    ← Dashboard
</button>
<h2>Order Details</h2>
<div class="row"><strong>Order ID:</strong> <span id="orderId"></span></div>
<div class="row">
  <strong>Customer:</strong>
  <span id="customer"></span>
</div>

<div class="row">
  <strong>Product:</strong>
  <span id="product"></span>
</div>
<div class="row">
    <strong>Custom Details:</strong>
    <span id="customDetails"></span>
</div>
<div class="row">
  <strong>Total Price:</strong>
  ₹<span id="price"></span>
</div>

<div class="row">
  <strong>Advance:</strong>
  ₹<span id="advance"></span>
</div>

<div class="row">
  <strong>Remaining Amount:</strong>
  ₹<span id="remaining"></span>
</div>

<div class="row">
  <strong>Status:</strong>
  <span id="status"></span>
</div>



<br>
<p>Update Status</p>
<select id="statusSelect">
    <option value="pending">Pending</option>
    <option value="price_confirmed">Price Confirmed</option>
    <option value="advance_paid">Advance Paid</option>
    <option value="paid">Paid</option>
    <option value="total_paid">Total Paid</option>
    <option value="delivered">Delivered</option>
</select>

<button onclick="updateStatus()">
    Update Status
</button>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");

document.getElementById("orderId").innerText = orderId;

async function loadOrder() {
  const response = await fetch(
    `/api/orders/${orderId}`
  );
  const data = await response.json();

  document.getElementById("customer").innerText = data.customer_name;
  document.getElementById("product").innerText = data.product_type;
  document.getElementById("price").innerText = data.total_price;
  document.getElementById("advance").innerText = data.advance_amount || 0;
  document.getElementById("remaining").innerText = data.remaining_amount || 0;
  document.getElementById("status").innerText = data.order_status;
  document.getElementById("statusSelect").value =
    data.order_status;
    document.getElementById("customDetails").innerText =
    data.custom_details || "-";
}

async function updateStatus(){

    const newStatus =
        document.getElementById("statusSelect").value;

    const response = await fetch(
        `/api/orders/${orderId}/status`,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                order_status:newStatus
            })
        }
    );

    const result = await response.json();

    alert(result.message);

    location.reload();
}
loadOrder();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <style>
        body{
    font-family: Arial, sans-serif;

    background-image:url("images/background.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    margin:0;
    padding:0;
}
.header-banner{
    text-align:center;
}

.header-banner img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    display:block;
}
.container{

    width:90%;
    max-width:1100px;

    margin:30px auto;

    background:rgba(255,255,255,0.45);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border-radius:20px;

    padding:25px;

    box-shadow:0 8px 30px rgba(0,0,0,0.15);
}
        h2{
    text-align:center;

    color:#2f3a2f;

    font-size:32px;

    margin-bottom:25px;
}

        table{
    width:100%;
    border-collapse:collapse;

    background:rgba(255,255,255,0.85);

    border-radius:15px;

    overflow:hidden;
}

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
    background:#115b12;
    color:white;
}
tr:hover{
    background:#f3fff3;
}
       button{

    background:#115b12;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#0c450d;
}

    </style>
</head>
<body>
  
<body>

<div class="header-banner">
    <img src="images/header.png" alt="The Resin Corner">
</div>

<div class="container">

    <h2>My Orders</h2>

    <button onclick="logout()">
        Logout
    </button>

    <br><br>

    <table>

    <thead>
        <tr>
            <th>Order ID</th>
            <th>Product</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="ordersTable"></tbody>

</table>
 </div>

<script>

if(!localStorage.getItem("userId")){
    window.location.href="login.html";
}

const userId = localStorage.getItem("userId");

async function loadOrders(){

    const response = await fetch(
        `/api/orders/user/${userId}`
    );

    const orders = await response.json();

    const table =
        document.getElementById("ordersTable");

    table.innerHTML = "";

    orders.forEach(order => {

        table.innerHTML += `
            <tr>

                <td>${order.order_id}</td>

                <td>${order.product_type}</td>

                <td>${order.order_status}</td>

                <td>
                    <button
                        onclick="viewOrder(${order.order_id})">
                        View
                    </button>
                </td>

            </tr>
        `;
    });
}

function viewOrder(orderId){

    window.location.href =
        `order-status.html?order_id=${orderId}`;
}
function logout(){

    localStorage.clear();

    window.location.href = "login.html";
}

loadOrders();

</script>

</body>
</html>
